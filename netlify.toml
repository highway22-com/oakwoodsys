[build]
  command = "npm run build"
  publish = "dist/oaw/browser"

[build.environment]
  NODE_VERSION = "20"

# Redirección de dominio: www y HTTP → HTTPS en dominio principal
[[redirects]]
  from = "https://www.oakwoodsystemsgroup.com/*"
  to = "https://oakwoodsystemsgroup.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://oakwoodsystemsgroup.com/*"
  to = "https://oakwoodsystemsgroup.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.oakwoodsystemsgroup.com/*"
  to = "https://oakwoodsystemsgroup.com/:splat"
  status = 301
  force = true

# Proxy GraphQL (CMS pages, case studies, etc.) – solo estático, sin servidor Node
[[redirects]]
  from = "/api/graphql"
  to = "https://oakwoodsys.com/graphql"
  status = 200
  force = true

# Proxy formulario de contacto → WordPress wp_mail
[[redirects]]
  from = "/api/contact"
  to = "https://oakwoodsys.com/wp-json/oakwood/v1/send-contact"
  status = 200
  force = true

# Configuración de campos del formulario (para formularios dinámicos)
[[redirects]]
  from = "/api/contact-fields"
  to = "https://oakwoodsys.com/wp-json/oakwood/v1/contact-fields"
  status = 200
  force = true

# Sitemap y robots: servir archivos estáticos (antes del catch-all SPA)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# SPA: rutas sin archivo estático sirven index.html (Angular Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
