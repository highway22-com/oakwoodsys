[build]
  command = "npm run build"
  publish = "dist/oaw/browser"

[build.environment]
  NODE_VERSION = "20"

# Redirección /home → / (canonical home)
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

# Redirección de dominio: www y HTTP → HTTPS en dominio principal
[[redirects]]
  from = "https://www.oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

# Propuesta C: Proxy WordPress directo a IP (sin subdominios)
# oakwoodsys.com → Netlify. /wp-admin, /graphql, etc. → proxy a 160.153.0.191
[[redirects]]
  from = "/wp-admin/*"
  to = "http://160.153.0.191/wp-admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "http://160.153.0.191/wp-login.php"
  status = 200
  force = true

[[redirects]]
  from = "/graphql"
  to = "http://160.153.0.191/graphql"
  status = 200
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "http://160.153.0.191/wp-json/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "http://160.153.0.191/wp-content/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "http://160.153.0.191/wp-includes/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/graphql"
  to = "http://160.153.0.191/graphql"
  status = 200
  force = true

[[redirects]]
  from = "/api/contact"
  to = "http://160.153.0.191/wp-json/oakwood/v1/send-contact"
  status = 200
  force = true

[[redirects]]
  from = "/api/contact-fields"
  to = "http://160.153.0.191/wp-json/oakwood/v1/contact-fields"
  status = 200
  force = true

# Sitemap y robots: servir archivos estáticos (antes del catch-all SPA)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# SPA: rutas sin archivo estático sirven index.html (Angular Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200