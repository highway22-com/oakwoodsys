[build]
  command = "npm run build"
  publish = "dist/oaw/browser"

[build.environment]
  NODE_VERSION = "20"

# ========== PRIMERO: Proxy WordPress (antes que cualquier otra regla) ==========
# Si estas rutas no van primero, caen en /* → index.html y Angular redirige a /404
# Propuesta C: oakwoodsys.com → Netlify. /wp-admin, /graphql, etc. → proxy a 160.153.0.191
[[redirects]]
  from = "/wp-admin"
  to = "http://160.153.0.191/wp-admin"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-admin/"
  to = "http://160.153.0.191/wp-admin/"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-admin/*"
  to = "http://160.153.0.191/wp-admin/:splat"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-login.php"
  to = "http://160.153.0.191/wp-login.php"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/graphql"
  to = "http://160.153.0.191/graphql"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-json/*"
  to = "http://160.153.0.191/wp-json/:splat"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-content/*"
  to = "http://160.153.0.191/wp-content/:splat"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

[[redirects]]
  from = "/wp-includes/*"
  to = "http://160.153.0.191/wp-includes/:splat"
  status = 200
  force = true
  headers = {Host = "oakwoodsys.com"}

