[build]
  command = "npm run build"
  publish = "dist/oaw/browser"

[build.environment]
  NODE_VERSION = "20"

# oakwoodsys.com → Angular. WordPress en oakwoodsystemsgroup.com.
# Proxy solo para API (GraphQL, contact) — evita CORS
[[redirects]]
  from = "/api/graphql"
  to = "https://oakwoodsystemsgroup.com/graphql"
  status = 200
  force = true

[[redirects]]
  from = "/api/contact"
  to = "https://oakwoodsystemsgroup.com/wp-json/oakwood/v1/send-contact"
  status = 200
  force = true

[[redirects]]
  from = "/api/contact-fields"
  to = "https://oakwoodsystemsgroup.com/wp-json/oakwood/v1/contact-fields"
  status = 200
  force = true

# Redirección /home → / (canonical home)
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

# Redirección de dominio: www y HTTP → HTTPS en dominio principal
[[redirects]]
  from = "https://www.oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.oakwoodsys.com/*"
  to = "https://oakwoodsys.com/:splat"
  status = 301
  force = true

# Sitemap y robots: servir archivos estáticos (antes del catch-all SPA)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# SPA: rutas sin archivo estático sirven index.html (Angular Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200