<ng-container *ngIf="content() as c">
<section class="w-full bg-[#F7F9FC]">

  <!-- Hero -->
  <app-video-hero
    [loading]="false"
    [hvh70]="true"
    [videoUrls]="c.hero.heroVideoUrls || []"
    [overlayImageUrl]="hasUpcomingEvents() ? null : '/assets/events/bg-events.jpg'"
    [poster]="c.hero.heroImage || ''"
    [title]="hasUpcomingEvents() ? c.hero.title : c.noEventsMessage.title"
    [description]="hasUpcomingEvents() ? c.hero.description : c.noEventsMessage.description"
    [centerContent]="!hasUpcomingEvents()"
    [showIndicators]="false"
  >
      <div hero-share *ngIf="hasUpcomingEvents()" class="flex items-center gap-3 pt-20">
        <label for="events-share" class="text-xs sm:text-sm text-white/80">Share</label>
        <a [href]="getFacebookShareUrl()" target="_blank" rel="noopener noreferrer"
          class="w-8 h-8 flex items-center justify-center text-white/80 hover:text-white transition-colors"
          aria-label="Share on Facebook">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
        </a>
        <a [href]="getTwitterShareUrl()" target="_blank" rel="noopener noreferrer"
          class="w-8 h-8 flex items-center justify-center text-white/80 hover:text-white transition-colors"
          aria-label="Share on Twitter">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M17.1761 4.24219H19.9362L13.9061 11.0196L21 20.2422H15.4456L11.0951 14.6488L6.11723 20.2422H3.35544L9.80517 12.993L3 4.24219H8.69545L12.6279 9.35481L17.1761 4.24219ZM16.2073 18.6176H17.7368L7.86441 5.78147H6.2232L16.2073 18.6176Z" />
          </svg>
        </a>
        <a [href]="getLinkedInShareUrl()" target="_blank" rel="noopener noreferrer"
          class="w-8 h-8 flex items-center justify-center text-white/80 hover:text-white transition-colors"
          aria-label="Share on LinkedIn">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
          </svg>
        </a>
        <a href="#" id="events-share" (click)="copyLinkToClipboard($event)"
          class="w-8 h-8 flex items-center justify-center text-white/80 hover:text-white transition-colors"
          aria-label="Copy link">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.125 12.375L16.5938 15.9062C14.8125 17.6562 11.9688 17.6562 10.2188 15.9062C8.5625 14.2188 8.46875 11.5625 10 9.78125L10.1562 9.59375C10.4375 9.28125 10.9062 9.25 11.2188 9.53125C11.5312 9.8125 11.5625 10.2812 11.2812 10.5938L11.1562 10.75C10.0938 11.9375 10.1562 13.7188 11.2812 14.8438C12.4375 16 14.3438 16 15.5312 14.8438L19.0625 11.3125C20.2188 10.125 20.2188 8.25 19.0625 7.0625C17.9375 5.96875 16.1562 5.90625 14.9688 6.9375L14.7812 7.09375C14.4688 7.375 14 7.34375 13.7188 7.03125C13.4375 6.71875 13.4688 6.25 13.7812 5.96875L13.9688 5.8125C15.75 4.25 18.4375 4.34375 20.125 6C21.875 7.75 21.875 10.5938 20.125 12.375ZM3.84375 11.6562L7.40625 8.125C9.15625 6.375 12 6.375 13.75 8.125C15.4375 9.78125 15.5312 12.4688 13.9688 14.25L13.7812 14.4375C13.5312 14.75 13.0312 14.8125 12.7188 14.5312C12.4062 14.25 12.375 13.7812 12.6562 13.4688L12.8438 13.2812C13.875 12.0938 13.8125 10.3125 12.6875 9.1875C11.5312 8 9.625 8 8.46875 9.1875L4.90625 12.7188C3.75 13.875 3.75 15.7812 4.90625 16.9688C6.03125 18.0625 7.8125 18.125 9 17.0938L9.1875 16.9375C9.5 16.6562 9.96875 16.6875 10.25 17C10.5312 17.3125 10.5 17.7812 10.1875 18.0625L10 18.2188C8.21875 19.7812 5.53125 19.6875 3.84375 18.0312C2.09375 16.2812 2.09375 13.4062 3.84375 11.6562Z" />
          </svg>
        </a>
      </div>
  </app-video-hero>

    <!-- Upcoming Events -->
  <section class="w-full py-12 sm:py-16 md:py-20 lg:py-24 bg-[#F2F8FD]" *ngIf="hasUpcomingEvents()">
    <div class="px-4 sm:px-6 md:px-8 lg:px-24">
      <div class="max-w-6xl mx-auto text-center mb-10 sm:mb-12">
        <p class="text-[18px] font-['Inter'] font-semibold leading-[150%] uppercase text-[#2A7EBF] text-center mb-3">{{ c.upcomingEventsSection.eyebrow }}</p>
        <h2 class="font-['Inter'] font-normal text-[#000000] text-[32px] leading-[110%] tracking-[-0.64px] text-center mb-3 sm:text-[40px] sm:leading-[120%] sm:tracking-[-0.5px] lg:text-[50px]">{{ c.upcomingEventsSection.title }}</h2>
        <p class="font-['Segoe_UI'] font-normal text-[18px] leading-[150%] text-[#454545] text-center max-w-5xl mx-auto">{{ c.upcomingEventsSection.description }}</p>
      </div>
      <ng-container *ngIf="hasUpcomingEvents()">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 sm:gap-8">
          <app-event-card
            *ngFor="let event of upcomingEvents(); trackBy: trackBySlug"
            [slug]="event.slug"
            [linkBase]="'/resources/events'"
            [imageUrl]="event.imageUrl"
            [imageAlt]="event.imageAlt"
            [badgeMonth]="event.badgeMonth"
            [badgeDay]="event.badgeDay"
            [tag]="event.tag"
            [statusType]="event.type"
            [location]="event.location"
            [eventDate]="event.eventDate"
            [eventTime]="event.eventTime"
            [title]="event.title"
            [readMoreText]="'View Event'"
          ></app-event-card>
        </div>
      </ng-container>


    </div>
  </section>

    <div class="px-4 sm:px-6 md:px-8 lg:px-10 bg-[#FFFFFF]">
      <app-cta-section
        [title]="c.ctaSection.title"
        [description]="c.ctaSection.description"
        [primaryText]="c.ctaSection.primaryText"
        [primaryLink]="c.ctaSection.primaryLink"
      ></app-cta-section>
    </div>



  <!-- Past Events -->
  <section id="past-events" class="w-full py-12 sm:py-16 md:py-20 lg:py-24 bg-white" *ngIf="false">
    <div class="px-4 sm:px-6 md:px-8 lg:px-24">
      <div class="max-w-6xl mx-auto text-center mb-10 sm:mb-12">
        <p class="text-[18px] font-['Inter'] font-semibold leading-[150%] uppercase text-[#2A7EBF] text-center mb-3">{{ c.pastEventsSection.eyebrow }}</p>
        <h2 class="font-['Inter'] font-normal text-[#000000] text-[32px] leading-[110%] tracking-[-0.64px] text-center mb-3 sm:text-[40px] sm:leading-[120%] sm:tracking-[-0.5px] lg:text-[50px]">{{ c.pastEventsSection.title }}</h2>
        <p class="font-['Segoe_UI'] font-normal text-[18px] leading-[150%] text-[#454545] text-center max-w-5xl mx-auto">{{ c.pastEventsSection.description }}</p>
      </div>
      <div
        #pastCarouselViewport
        class="overflow-hidden select-none touch-pan-y"
        (click)="onPastViewportClick($event)"
        (dragstart)="onPastDragStart($event)"
        (pointerdown)="onPastPointerDown($event)"
      >
        <div
          class="flex md:cursor-grab"
          [ngClass]="isPastDragging() ? 'cursor-grabbing transition-none' : 'transition-transform duration-500 ease-out'"
          [style.transform]="pastTrackTransform()"
        >
          <div class="w-full shrink-0 px-3 sm:px-4" *ngFor="let slide of pastSlides()">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
              <ng-container *ngFor="let event of slide; trackBy: trackBySlideItem">
                <app-event-card
                  *ngIf="event; else emptyCardSlot"
                  class="h-full"
                  [slug]="event.slug"
                  [linkBase]="'/resources/events'"
                  [imageUrl]="event.imageUrl"
                  [imageAlt]="event.imageAlt"
                  [badgeMonth]="event.badgeMonth"
                  [badgeDay]="event.badgeDay"
                  [tag]="event.tag"
                  [statusType]="event.type"
                  [location]="event.location"
                  [eventDate]="event.eventDate"
                  [eventTime]="event.eventTime"
                  [title]="event.title"
                  [readMoreText]="'View Event'"
                ></app-event-card>
                <ng-template #emptyCardSlot>
                  <div class="hidden lg:block"></div>
                </ng-template>
              </ng-container>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination dots -->
      <div *ngIf="pastPageCount() > 1" class="flex items-center justify-center gap-2 mt-10">
        <button
          *ngFor="let page of pastPageArray()"
          (click)="goToPastPage(page)"
          [attr.aria-label]="'Go to page ' + (page + 1)"
          class="rounded-full w-8 h-[3px] transition-all duration-300 ease-in-out"
          [ngClass]="pastEventsPage() === page
            ? 'bg-[#2A7EBF] opacity-100'
            : 'bg-[#2A7EBF] opacity-25 hover:opacity-40'"
        ></button>
      </div>
    </div>
  </section>

 

</section>
</ng-container>
