<section
  class="py-12 sm:py-16 md:py-20 lg:py-24 animate-fade-in mt-6 sm:mt-12 md:mt-16 lg:mt-6 pr-10 relative overflow-hidden"
>
  <!-- Background image with opacity -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-24 lg:px-12"
    style="background-image: url(&quot;/assets/bg-blue.png&quot;)"
  ></div>
  <div class="mx-auto w-full px-4 sm:px-6 md:px-8 lg:px-20 flex items-start justify-center">
    <div
      class="grid grid-cols-1 lg:grid-cols-[55%_45%] gap-6 md:gap-10 lg:gap-12 w-full overflow-visible relative"
    >
      <!-- LEFT -->
      <div
        class="flex flex-col justify-center items-center h-full px-6 sm:px-8 lg:px-12 py-10 sm:py-12 animate-fade-in"
      >
        <svg
          width="240"
          height="239"
          viewBox="0 0 240 239"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="120.001" cy="119.5" r="76.4697" stroke="#C3DDF4" />
          <circle
            cx="119.999"
            cy="119.5"
            r="114.522"
            stroke="#E4EEFA"
            stroke-width="2"
          />
          <path
            d="M167.314 123.637L163.539 128.391C162.395 129.831 161.898 131.676 162.167 133.493L163.052 139.484C163.505 142.544 161.783 145.51 158.895 146.646L153.248 148.87C151.529 149.547 150.169 150.902 149.487 152.615L147.254 158.238C146.113 161.114 143.134 162.828 140.062 162.379L134.046 161.497C132.224 161.229 130.37 161.725 128.923 162.863L124.148 166.623C121.717 168.537 118.281 168.537 115.85 166.623L111.076 162.863C109.63 161.725 107.777 161.229 105.952 161.497L99.9366 162.379C96.8643 162.83 93.8854 161.114 92.7444 158.238L90.5112 152.615C89.832 150.904 88.4712 149.549 86.7509 148.87L81.1037 146.646C78.2157 145.51 76.4954 142.544 76.946 139.484L77.8317 133.493C78.1003 131.679 77.6031 129.833 76.4599 128.391L72.684 123.637C70.7616 121.216 70.7616 117.794 72.684 115.373L76.4599 110.619C77.6031 109.18 78.1003 107.334 77.8317 105.517L76.946 99.526C76.4931 96.4666 78.2157 93.5 81.1037 92.3638L86.7509 90.1399C88.469 89.4635 89.8298 88.1084 90.5112 86.3953L92.7444 80.7716C93.8854 77.8956 96.8643 76.1825 99.9366 76.6312L105.952 77.5132C107.775 77.7807 109.628 77.2855 111.076 76.1471L115.85 72.3869C118.281 70.4726 121.717 70.4726 124.148 72.3869L128.923 76.1471C130.368 77.2855 132.221 77.7807 134.046 77.5132L140.062 76.6312C143.134 76.1803 146.113 77.8956 147.254 80.7716L149.487 86.3953C150.166 88.1062 151.527 89.4613 153.248 90.1399L158.895 92.3638C161.783 93.5 163.503 96.4666 163.052 99.526L162.167 105.517C161.898 107.331 162.395 109.177 163.539 110.619L167.314 115.373C169.237 117.794 169.237 121.216 167.314 123.637Z"
            fill="#4ADE80"
          />
          <path
            d="M112.167 137.612H112.147C111.173 137.605 110.254 137.172 109.632 136.425L99.6386 124.399C98.4798 123.004 98.6752 120.94 100.076 119.788C101.477 118.634 103.55 118.829 104.706 120.224L112.196 129.236L138.052 104.902C139.227 103.521 141.302 103.35 142.69 104.52C144.077 105.689 144.248 107.756 143.074 109.138L114.678 136.456C114.052 137.19 113.135 137.614 112.167 137.614V137.612Z"
            fill="white"
          />
        </svg>

        <h1
          class="text-3xl sm:text-4xl lg:text-[44px] font-inter font-normal leading-[125%] tracking-[-0.8px] mt-4 mb-3 animate-fade-in [animation-delay:200ms]"
        >
          {{ copy().titleLine1 }}<br class="hidden sm:block" />
          {{ copy().titleLine2 }}
        </h1>
        <p
          class="text-black font-['Segoe_UI'] text-base sm:text-[18px] font-normal leading-[150%] mb-8 max-w-xl animate-fade-in [animation-delay:400ms]"
        >
          {{ copy().description }}
        </p>
      </div>
      <!-- RIGHT -->
      <div
        class="relative overflow-hidden h-80 sm:h-[420px] lg:h-auto lg:min-h-[620px]"
      >
        <img
          [src]="copy().image.src"
          class="block w-full h-full object-cover  animate-fade-in [animation-delay:300ms]"
          [alt]="copy().image.alt"
        />
        <!--Stats-->
        <div class="absolute inset-x-0 bottom-0 z-10 pointer-events-none">
          <div
            class="bg-gradient-to-t from-black/70 to-transparent px-3 sm:px-4 lg:px-6 py-3 sm:py-4"
          >
            <div
              class="max-w-[1100px] mx-auto grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-2 sm:gap-3 lg:gap-4 text-white pointer-events-auto"
            >
              <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <img
                  [src]="stats()[0].icon"
                  alt=""
                  class="w-[28px] h-[16px] object-contain"
                  loading="lazy"
                />

                <div class="min-w-0">
                  <div
                    class="font-[Segoe_UI] font-semibold text-[22px] sm:text-[24px] lg:text-[30px] leading-[110%] tracking-[-0.02em]"
                  >
                    {{ stats()[0].value }}
                  </div>
                  <div
                    class="font-[Inter] font-normal text-[13px] sm:text-[14px] lg:text-[16px] leading-[140%] sm:leading-[150%] tracking-[0em] opacity-90 break-normal"
                  >
                    {{ stats()[0].label }}
                  </div>
                </div>
              </div>

              <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <img
                  [src]="stats()[1].icon"
                  alt=""
                  class="w-[24px] h-[22px] object-contain"
                  loading="lazy"
                />

                <div class="min-w-0">
                  <div
                    class="font-[Segoe_UI] font-semibold text-[22px] sm:text-[24px] lg:text-[30px] leading-[110%] tracking-[-0.02em]"
                  >
                    {{ stats()[1].value }}
                  </div>
                  <div
                    class="font-[Inter] font-normal text-[13px] sm:text-[14px] lg:text-[16px] leading-[140%] sm:leading-[150%] tracking-[0em] opacity-90 break-normal"
                  >
                    {{ stats()[1].label }}
                  </div>
                </div>
              </div>

              <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <img
                  [src]="stats()[2].icon"
                  alt=""
                  class="w-[24px] h-[24px] object-contain"
                  loading="lazy"
                />

                <div class="min-w-0">
                  <div
                    class="font-[Segoe_UI] font-semibold text-[22px] sm:text-[24px] lg:text-[30px] leading-[110%] tracking-[-0.02em] break-normal whitespace-nowrap"
                  >
                    {{ stats()[2].value }}
                  </div>
                  <div
                    class="font-[Inter] font-normal text-[13px] sm:text-[14px] lg:text-[16px] leading-[140%] sm:leading-[150%] tracking-[0em] break-normal"
                  >
                    {{ stats()[2].label }}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-office-locations-section [dataOverride]="officeLocations()"></app-office-locations-section>

<section class="mb-8 sm:mb-12 md:mb-16 lg:mb-8">
  <div class="mx-auto w-full px-2 sm:px-6 md:px-8 lg:px-8">
    <div class="grid grid-cols-1 gap-10 lg:gap-16 items-stretch">
      <app-cta-section
        [title]="licensingCtaCopy().title"
        [description]="licensingCtaCopy().description"
        [primaryText]="licensingCtaCopy().primaryText"
        [primaryLink]="licensingCtaCopy().primaryLink"
        [backgroundGradientValue]="licensingGradient"
      >
      </app-cta-section>
    </div>
  </div>
</section>
