<div class=" min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto">
    @if (!editMode()) {
    <p class="text-gray-500">Loading...</p>
    } @else {
    <div class="mb-6 inline-flex items-center">
      <a
        routerLink="/"
        class="edit-back-button"
        aria-label="Back to site"
      >
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="edit-back-button__label">Back to site</span>
      </a>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Edit</h1>
    <p class="text-gray-600 mb-8">Click on page to edit.</p>

    <ul class="space-y-3">
      @for (item of editableItems; track item.slug) {
      <li>
        <a [routerLink]="item.editPath" [queryParams]="{ edit: 'true' }"
          class="block w-full px-6 py-4 bg-white border border-gray-200 rounded-lg shadow-sm hover:border-blue-500 hover:shadow-md transition-all duration-200 text-left">
          <span class="font-medium text-gray-900">{{ item.label }}</span>
          <span class="block text-sm text-gray-500 mt-1">{{ item.slug }}</span>
        </a>
      </li>
      }
    </ul>
    }
  </div>
</div>
