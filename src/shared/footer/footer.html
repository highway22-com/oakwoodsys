<div class="hidden md:block bg-[#112740] border-t border-[#FFFFFF33]"></div>
<footer class="bg-[#112740] py-4 border-t-0 pb-12 sm:pb-16 lg:pb-4" data-nosnippet>
  <div class="container mx-auto px-4 sm:px-6 md:px-8 lg:px-12">
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 text-white text-sm">
      <!-- Copyright -->
      <div class="text-center">
        <p class="text-white/80 font-['Segoe UI'] text-base md:text-sm font-normal leading-[1.5]">
          {{ displayCopyright }}
        </p>
      </div>

      <!-- Footer Links -->
      <div class="flex items-center gap-6">
        @for (policy of displayPolicies; track policy.text) {
          <a [routerLink]="policy.link" class="text-sm text-white/80 font-normal leading-[1.5] underline hover:text-white transition-colors">
            {{ policy.text }}
          </a>
        }
      </div>
    </div>
  </div>
</footer>
