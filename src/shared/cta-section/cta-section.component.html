<section class="w-full bg-white px-4 sm:px-6 md:px-8 lg:px-12 py-12 sm:py-12 md:py-16">
    <div class="w-full px-4 sm:px-6 md:px-8 lg:px-36 xl:px-36 py-16 sm:py-16 md:py-30"
        [style.background]="bgImg ? 'url(' + bgImg + ') center/cover no-repeat' : ''"
        aria-label="Call to Action">
        <div class="max-w-6xl mx-auto text-center">
            @if (title()) {
            <h2 class="font-inter text-black font-normal leading-[110%] sm:leading-[120%] text-5xl tracking-[-0.96px] lg:text-[64px] lg:tracking-[-1.28px] font-normal  mb-4 sm:mb-6 ">
                {{ title() }}
            </h2>
            }
            @if (description()) {
            <p class="text-black text-center font-segoe font-normal leading-[150%] text-[18px] lg:text-[20px] mb-8 sm:mb-10 md:mb-12  mx-auto">
                {{ description() }}
            </p>
            }
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 justify-center items-stretch sm:items-center">
                @if (primaryText()) {
                <div class="w-full sm:w-auto flex justify-center">
                    <app-button-primary [text]="primaryText()" [link]="primaryLink()" />
                </div>
                }
                @if (secondaryText()) {
                <div class="w-full sm:w-auto flex justify-center">
                    <app-button-primary [text]="secondaryText()" [link]="secondaryLink()" [isTransparent]="true"
                        [borderColor]="'black'" />
                </div>
                }
            </div>
        </div>
    </div>
</section>
